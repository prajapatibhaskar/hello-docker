name: Build and Push to Docker Hub

# When should the robot run? Every time you push to the 'main' branch.
on:
  push:
    branches:
      - main

jobs:
  build:
    # This tells GitHub to give you a free, fresh Linux computer in the cloud
    runs-on: ubuntu-latest 

    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v3

      - name: 2. Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 3. Build and Push the Lunchbox!
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # This names your image: yourusername/my-first-pipeline:latest
          tags: ${{ secrets.DOCKER_USERNAME }}/my-first-pipeline:latest
